name: CI

# Run on PRs (branch protection requires this) and on pushes to main.
# Not on every feature-branch push, to avoid duplicate runs alongside the PR.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'src/**'
              - 'public/**'
              - 'package*.json'
              - 'vite.config.*'
              - 'tsconfig*.json'
              - 'index.html'
            backend:
              - 'backend/**'

  frontend:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - if: needs.changes.outputs.frontend == 'true'
        run: npm ci
      - if: needs.changes.outputs.frontend == 'true'
        run: npx tsc --noEmit
      - if: needs.changes.outputs.frontend == 'true'
        run: npm run build
      - if: needs.changes.outputs.frontend == 'true'
        run: npm test --if-present
      - if: needs.changes.outputs.frontend != 'true'
        run: echo "No frontend changes detected — build/test skipped."

  backend:
    needs: changes
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      # Backend modules import as top-level (e.g. `from config import ...`), so pytest
      # must run from backend/. pytest isn't a runtime dep, so install it explicitly.
      - if: needs.changes.outputs.backend == 'true'
        run: pip install -r requirements.txt pytest
      - name: Run backend tests if present
        if: needs.changes.outputs.backend == 'true'
        run: |
          if [ -d tests ] || ls test_*.py >/dev/null 2>&1; then
            pytest
          else
            echo "No backend tests yet; skipping."
          fi
      - if: needs.changes.outputs.backend != 'true'
        run: echo "No backend changes detected — install/test skipped."

  agent-tools:
    # The agent-ops token minter lives in infra/, outside the backend pytest path,
    # so it gets its own small job. Deps are mocked in the tests but must import.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/agent-ops
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt pytest
      - run: pytest
  
  agent-tools-ps:
  # Pester unit tests for the shared agent-ops PowerShell helpers (common.ps1).
  # Pure-logic functions accept injected fixtures, so they run cross-platform on pwsh.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/agent-ops
    steps:
      - uses: actions/checkout@v4
      - name: Install Pester
        shell: pwsh
        run: Install-Module Pester -MinimumVersion 5.5.0 -Force -Scope CurrentUser
      - name: Run Pester
        shell: pwsh
        run: Invoke-Pester -CI -Path .
