name: Deploy

# Manual trigger for now. Switch to `push: branches: [main]` (task #9) only AFTER a
# successful manual deploy has proven the GCP wiring (Artifact Registry, secrets,
# IAM, Firestore) end-to-end.
on:
  workflow_dispatch:

env:
  GCP_PROJECT_ID: dnd-session-assistant-52633
  GCP_REGION: europe-west1
  BACKEND_SERVICE_NAME: dnd-session-backend
  # Stable — Cloud Run guarantees this URL won't change while the service name
  # and project ID are fixed (BACKEND_SERVICE_NAME + GCP_PROJECT_ID above).
  BACKEND_URL: https://dnd-session-backend-xfoyj2vjxq-ew.a.run.app
  # Cost / abuse guards (mirror infra/deploy-backend.ps1).
  MAX_INSTANCES: '2'
  CONCURRENCY: '40'
  FRONTEND_ORIGINS: 'https://dnd-session-assistant-52633.web.app,https://dnd-session-assistant-52633.firebaseapp.com'

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build and push backend container
        # docker build+push runs on the GitHub runner directly — avoids Cloud Build
        # log-streaming permission requirements.
        run: |
          gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet
          IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/docker-repo/${{ env.BACKEND_SERVICE_NAME }}:${{ github.sha }}"
          docker build -t "$IMAGE" backend/
          docker push "$IMAGE"

      - name: Deploy to Cloud Run
        # Public at the IAM layer; every paid route is gated by Firebase Auth +
        # ALLOWED_EMAILS in the app (backend/auth.py). --env-vars-file avoids comma
        # escaping issues with ALLOWED_ORIGINS (which is itself a comma-separated list).
        run: |
          cat > /tmp/backend-env.yaml << 'EOF'
          GCP_PROJECT: ${{ env.GCP_PROJECT_ID }}
          ALLOWED_ORIGINS: "${{ env.FRONTEND_ORIGINS }}"
          STT_TOKEN_TTL_SECONDS: "300"
          EOF
          gcloud run deploy ${{ env.BACKEND_SERVICE_NAME }} \
            --image ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/docker-repo/${{ env.BACKEND_SERVICE_NAME }}:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --max-instances ${{ env.MAX_INSTANCES }} \
            --concurrency ${{ env.CONCURRENCY }} \
            --set-secrets "SONIOX_API_KEY=SONIOX_API_KEY:latest,DEEPGRAM_API_KEY=DEEPGRAM_API_KEY:latest,ALLOWED_EMAILS=ALLOWED_EMAILS:latest" \
            --env-vars-file /tmp/backend-env.yaml

  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm ci
      - run: npm run build
        # Vite inlines these at build time. Firebase web config is non-secret, so it
        # lives in repo Actions *variables* (vars.*); VITE_API_BASE is the Cloud Run URL.
        env:
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
          VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Firebase Hosting
        # Write GCP_SA_KEY directly so firebase-tools picks up the raw SA JSON via
        # GOOGLE_APPLICATION_CREDENTIALS (the auth action's credential file format is
        # gcloud-specific and not always recognised by firebase-tools).
        # Firebase returns HTTP 400 "is the current active version" when the build output
        # is byte-for-byte identical to what's already live (same content hash). That is a
        # no-op success, not a real failure — treat it as such.
        env:
          SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          echo "$SA_KEY" > /tmp/sa-key.json
          trap "rm -f /tmp/sa-key.json" EXIT
          GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json \
            npx firebase-tools deploy --project ${{ env.GCP_PROJECT_ID }} --only hosting \
            2>&1 | tee /tmp/fb-deploy.log
          EXIT=${PIPESTATUS[0]}
          if grep -q "is the current active version" /tmp/fb-deploy.log; then
            echo "Hosting already at current version — no-op deploy."
            exit 0
          fi
          exit $EXIT

  smoke-test:
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: needs.deploy-backend.result == 'success' && needs.deploy-frontend.result == 'success'
    steps:
      - name: Backend health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 ${{ env.BACKEND_URL }}/api/health)
          [ "$STATUS" = "200" ] || (echo "::error::Health check failed: HTTP $STATUS" && exit 1)

      - name: Auth gate check (expect 401)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "${{ env.BACKEND_URL }}/api/stt-token?provider=invalid")
          [ "$STATUS" = "401" ] || (echo "::error::Auth gate broken: expected 401, got $STATUS" && exit 1)

      - name: Frontend availability check
        # Firebase Hosting site name matches GCP_PROJECT_ID by convention (single-site project).
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://${{ env.GCP_PROJECT_ID }}.web.app)
          [ "$STATUS" = "200" ] || (echo "::error::Frontend unavailable: HTTP $STATUS" && exit 1)
