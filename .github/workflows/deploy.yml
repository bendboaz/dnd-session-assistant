name: Deploy

# Manual trigger for now. Switch to `push: branches: [main]` (task #9) only AFTER a
# successful manual deploy has proven the GCP wiring (Artifact Registry, secrets,
# IAM, Firestore) end-to-end.
on:
  workflow_dispatch:

env:
  GCP_PROJECT_ID: dnd-session-assistant
  GCP_REGION: europe-west1
  BACKEND_SERVICE_NAME: dnd-session-backend
  # Cost / abuse guards (mirror infra/deploy-backend.ps1).
  MAX_INSTANCES: '2'
  CONCURRENCY: '40'
  FRONTEND_ORIGINS: 'https://dnd-session-assistant.web.app,https://dnd-session-assistant.firebaseapp.com'

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build and push backend container
        run: |
          gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev
          gcloud builds submit \
            --tag ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/docker-repo/${{ env.BACKEND_SERVICE_NAME }}:${{ github.sha }} \
            backend/

      - name: Deploy to Cloud Run
        # Public at the IAM layer; every paid route is gated by Firebase Auth +
        # ALLOWED_EMAILS in the app (backend/auth.py).
        run: |
          gcloud run deploy ${{ env.BACKEND_SERVICE_NAME }} \
            --image ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/docker-repo/${{ env.BACKEND_SERVICE_NAME }}:${{ github.sha }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --max-instances ${{ env.MAX_INSTANCES }} \
            --concurrency ${{ env.CONCURRENCY }} \
            --set-secrets "SONIOX_API_KEY=SONIOX_API_KEY:latest,DEEPGRAM_API_KEY=DEEPGRAM_API_KEY:latest,ALLOWED_EMAILS=ALLOWED_EMAILS:latest" \
            --set-env-vars "GCP_PROJECT=${{ env.GCP_PROJECT_ID }},ALLOWED_ORIGINS=${{ env.FRONTEND_ORIGINS }},STT_TOKEN_TTL_SECONDS=300"

  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm ci
      - run: npm run build
        # Vite inlines these at build time. Firebase web config is non-secret, so it
        # lives in repo Actions *variables* (vars.*); VITE_API_BASE is the Cloud Run URL.
        env:
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
          VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Firebase Hosting
        run: |
          npm install -g firebase-tools
          firebase deploy --project ${{ env.GCP_PROJECT_ID }} --token $(gcloud auth application-default print-access-token)
